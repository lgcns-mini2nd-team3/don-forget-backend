application: app/v1
kind: Deployment
metedata:
  name: user-deployment
  namespace: 

spec:
  revisionHistoryLimit: 2

  replicas: 2
  selector:
    matchLabels:
      app: users
  
  template:
    metedata:
      labels:
        app: users

    spec:
      containers:
      - name: user-container
        image:
        ports:
          - containers:
        env:
        - name: DB_HOST
          valueForm:
            secretKeyRef:
              name:
              key:
          
        - name: DB_PASSWORD
          valueForm:
            secretRefKey:
              name:
              key:

        - name: DB_URL
          valueForm:
            secretRefKey:
              name:
              key:


---


apiVersion: v1
kind: Service

metedata:
  name: user-service
  namespace:

spec:
  type: ClusterIP
  ports:
  - port: 
    targetPort:
  selector:
    app: user

  
