# Pod 가용성 확보 및 ReplicaSet 관리를 위한 설정
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-billing-deployment
  namespace: lgcns                  # 전사 공통 네임스페이스 준수
spec:  
  revisionHistoryLimit: 2           # 업데이트 이력 보관 제한을 통한 자원 효율화
  replicas: 1                       
  selector:
    matchLabels:
      app: external-billing
  template:
    metadata:
      labels:
        app: external-billing
    spec:
      containers:               
        - name: external-billing-container
          image: 313984758699.dkr.ecr.ap-northeast-2.amazonaws.com/external-billing-service:latest
          ports:
            - containerPort: 8080   
          resources:
            # 서비스 안정성 보장을 위한 최소/최대 자원 할당량 명시
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.5"
              memory: "250Mi"
          env:
            # 인프라 공통 Secret을 통한 DB 접속 정보 주입
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_HOST
            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_ADMIN
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_PASSWORD
---
# 클러스터 내부 서비스 간 도메인 기반 통신 지원
apiVersion: v1
kind: Service
metadata:
  name: external-billing-service
  namespace: lgcns
spec:        
  type: ClusterIP
  selector:
    app: external-billing
  ports:
    - port: 80                      # 외부 노출 포트
      targetPort: 8080              # 애플리케이션 실제 포트