server:
  port: 8087

spring:
  application:
    name: external-billing-service
  
  # DB 연결 설정
  datasource:
    url: jdbc:mariadb://localhost:3306/user_bill
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password:  # [주의] 로컬 테스트 시에만 비번 입력, 푸시 전엔 공백 유지!
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  
  cloud:
    config:
      enabled: false

