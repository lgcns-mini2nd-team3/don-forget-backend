spring:
  application:
    name: my-bill-service

  config:
    # config server import
    # 설정 서버에서 설정을 가져올 때, config server의 주소를 명시적으로 지정하는 부분입니다.
    import: "optional:configserver:http://localhost:8888"
    # 이건 config server가 없을 때 애플리케이션이 시작되지 않도록 하는 설정입니다.
    fail-fast: true

  datasource:
    url: jdbc:mariadb://localhost:3306/inspire?useSSL=false
    username: root
    password: 123456789

    
