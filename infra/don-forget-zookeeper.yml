
apiVersion: apps/v1

kind: Deployment

metadata:
  name: zookeeper-deployment
  namespace: don-forget
    

spec: 
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper

  template:
    metadata:
      labels:
        app: zookeeper

    spec:
    #docker container
      containers:
      - name: zookeeper-container
      # 혹, 실행중인 컨테이너를 이미지를 만들고 ecr 바포할 경우 ecr repo 주소사용 가능
        image: wurstmeister/zookeeper
        ports:
          - containerPort: 2181




---  

apiVersion: v1
kind: Service
metadata:
  name: zookeeper-service
  namespace: don-forget

spec: 
  type: ClusterIP
  ports:
  - port: 2181
    targetPort: 2181       
  selector:
    app: zookeeper      